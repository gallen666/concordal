# Alternative: Fly.io deploy config. Same Dockerfile, different host.
# Run `fly launch --no-deploy` once to bind a real app name, then `fly deploy`.

app = "trading-agents-api"
primary_region = "sin"   # Singapore - good for APAC + globally reachable

[build]

[env]
  PORT = "8000"
  TA_MODE = "mock"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = true     # save $ when idle
  auto_start_machines = true
  min_machines_running = 0      # bump to 1 if you can't tolerate cold start

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    method = "GET"
    path = "/v1/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
