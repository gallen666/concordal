name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install "pydantic[email]" pandas numpy fastapi uvicorn httpx pytest PyJWT \
                      langgraph langchain-core tenacity rich typer

      - name: Run tests
        run: PYTHONPATH=src pytest -q tests/

      - name: Run smoke decision (mock mode)
        run: PYTHONPATH=src python examples/run_decision.py
        env:
          TA_MODE: mock

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci || npm install

      - name: Type-check + build
        run: npm run build
        env:
          NEXT_PUBLIC_API: https://placeholder.example.com

  docker-build:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        run: docker build -t trading-agents-api:ci .
